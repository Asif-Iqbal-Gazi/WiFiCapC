name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-aarch64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cross-compile libnl for aarch64 (static)
        run: |
          wget -q https://github.com/thom311/libnl/releases/download/libnl3_9_0/libnl-3.9.0.tar.gz
          tar xf libnl-3.9.0.tar.gz

          # libnl 3.9.0 is missing <time.h> in lib/xfrm/ — fatal with GCC 13.
          # Patch every file that pulls in nl-xfrm.h (ae.c, sp.c, …) in one shot.
          grep -rl 'nl-aux-xfrm/nl-xfrm.h' libnl-3.9.0/lib/xfrm/ | \
            xargs sed -i 's|#include "nl-aux-xfrm/nl-xfrm.h"|#include "nl-aux-xfrm/nl-xfrm.h"\n#include <time.h>|'
          # lib/socket.c has the same missing include (nl-core.h path, GCC 13 warning→error).
          sed -i 's|#include "nl-aux-core/nl-core.h"|#include "nl-aux-core/nl-core.h"\n#include <time.h>|' \
            libnl-3.9.0/lib/socket.c

          cd libnl-3.9.0
          ./configure \
            --host=aarch64-linux-gnu \
            --prefix=/opt/libnl-aarch64 \
            --enable-static \
            --disable-shared \
            --disable-cli \
            --disable-pthreads
          make -j$(nproc) install

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build wificapc
        run: |
          make \
            CC=aarch64-linux-gnu-gcc \
            NL_CFLAGS="-I/opt/libnl-aarch64/include/libnl3" \
            NL_LIBS="/opt/libnl-aarch64/lib/libnl-genl-3.a /opt/libnl-aarch64/lib/libnl-3.a"

      - name: Verify binary is aarch64
        run: file wificapc | grep -q "aarch64"

      - name: Package
        run: |
          sha256sum wificapc | awk '{print "SHA256 = " $1}' > wificapc.sha256
          zip wificapc-${{ env.VERSION }}-aarch64.zip wificapc wificapc.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wificapc-${{ env.VERSION }}-aarch64.zip
          generate_release_notes: true
